apiVersion: apps/v1
kind: Deployment
metadata:
  name: module-chat
  namespace: klosetlab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: module-chat
  template:
    metadata:
      labels:
        app: module-chat
    spec:
      imagePullSecrets:
      - name: ecr-registry-secret
      containers:
      - name: module-chat
        image: 862012315401.dkr.ecr.ap-northeast-2.amazonaws.com/klosetlab/module-chat:d06bceb5de659f168092a698e5f0b7c79ce02942
        ports:
        - containerPort: 8081
        envFrom:
        - secretRef:
            name: module-chat-secret
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 10
