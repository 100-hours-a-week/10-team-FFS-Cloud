apiVersion: apps/v1
kind: Deployment
metadata:
  name: module-chat
  namespace: klosetlab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: module-chat
  template:
    metadata:
      labels:
        app: module-chat
    spec:
      containers:
      - name: module-chat
        image: 862012315401.dkr.ecr.ap-northeast-2.amazonaws.com/klosetlab/module-chat:0ba86719fdc42aebc2046e3f67e6798567b97023
        ports:
        - containerPort: 8081
        envFrom:
        - secretRef:
            name: module-chat-secret
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: module-chat-svc
  namespace: klosetlab
spec:
  type: ClusterIP
  selector:
    app: module-chat
  ports:
  - protocol: TCP
    port: 8081
    targetPort: 8081
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: module-chat-ingress
  namespace: klosetlab
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - v3.klosetlab.site
    secretName: klosetlab-tls
  rules:
  - host: v3.klosetlab.site
    http:
      paths:
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: module-chat-svc
            port:
              number: 8081
