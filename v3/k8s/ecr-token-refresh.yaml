apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-token-refresh
  namespace: klosetlab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-token-refresh
  namespace: klosetlab
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "create", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-token-refresh
  namespace: klosetlab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ecr-token-refresh
subjects:
- kind: ServiceAccount
  name: ecr-token-refresh
  namespace: klosetlab
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-token-refresh
  namespace: klosetlab
spec:
  schedule: "0 */10 * * *"   # 10시간마다 갱신
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ecr-token-refresh
          restartPolicy: Never
          containers:
          - name: ecr-token-refresh
            image: alpine/k8s:1.29.2
            command:
            - /bin/sh
            - -c
            - |
              ECR_TOKEN=$(aws ecr get-login-password --region ap-northeast-2)
              kubectl create secret docker-registry ecr-registry-secret \
                --docker-server=862012315401.dkr.ecr.ap-northeast-2.amazonaws.com \
                --docker-username=AWS \
                --docker-password=$ECR_TOKEN \
                --namespace=klosetlab \
                --dry-run=client -o yaml | kubectl apply -f -
            env:
            - name: AWS_DEFAULT_REGION
              value: ap-northeast-2
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: ecr-refresh-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ecr-refresh-credentials
                  key: AWS_SECRET_ACCESS_KEY
