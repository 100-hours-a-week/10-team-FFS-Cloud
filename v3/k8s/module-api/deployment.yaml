apiVersion: apps/v1
kind: Deployment
metadata:
  name: module-api
  namespace: klosetlab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: module-api
  template:
    metadata:
      labels:
        app: module-api
    spec:
      imagePullSecrets:
      - name: ecr-registry-secret
      containers:
      - name: module-api
        image: 862012315401.dkr.ecr.ap-northeast-2.amazonaws.com/klosetlab/module-api:bb5be4052e7046ac6ac7ba9a36e8b986d29acb59
        ports:
        - containerPort: 8080
        env:
        - name: JAVA_TOOL_OPTIONS
          value: "-Xms512m -Xmx1536m -XX:MetaspaceSize=128m -XX:MaxMetaspaceSize=256m"
        envFrom:
        - secretRef:
            name: module-api-secret
        resources:
          requests:
            cpu: 250m
            memory: 768Mi
          limits:
            cpu: 500m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
