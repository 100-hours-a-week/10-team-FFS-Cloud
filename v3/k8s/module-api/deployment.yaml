apiVersion: apps/v1
kind: Deployment
metadata:
  name: module-api
  namespace: klosetlab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: module-api
  template:
    metadata:
      labels:
        app: module-api
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: node-role
                operator: In
                values: ["app"]
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: module-api
              topologyKey: kubernetes.io/hostname
      imagePullSecrets:
      - name: ecr-registry-secret
      containers:
      - name: module-api
        image: 862012315401.dkr.ecr.ap-northeast-2.amazonaws.com/klosetlab/module-api:854e47dacf1c10780c0dc66b5fb7d6115ac1e9c2
        ports:
        - containerPort: 8080
        env:
        - name: JAVA_TOOL_OPTIONS
          value: "-Xms512m -Xmx1536m -XX:MetaspaceSize=128m -XX:MaxMetaspaceSize=256m"
        envFrom:
        - secretRef:
            name: module-api-secret
        resources:
          requests:
            cpu: 250m
            memory: 768Mi
          limits:
            cpu: 500m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
