apiVersion: apps/v1
kind: Deployment
metadata:
  name: module-api
  namespace: klosetlab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: module-api
  template:
    metadata:
      labels:
        app: module-api
    spec:
      imagePullSecrets:
      - name: ecr-registry-secret
      containers:
      - name: module-api
        image: 862012315401.dkr.ecr.ap-northeast-2.amazonaws.com/klosetlab/module-api:0ba86719fdc42aebc2046e3f67e6798567b97023
        ports:
        - containerPort: 8080
        env:
        - name: JAVA_TOOL_OPTIONS
          value: "-Xms512m -Xmx1536m -XX:MetaspaceSize=128m -XX:MaxMetaspaceSize=256m"
        envFrom:
        - secretRef:
            name: module-api-secret
        resources:
          requests:
            cpu: 250m
            memory: 768Mi
          limits:
            cpu: 500m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: module-api-svc
  namespace: klosetlab
spec:
  type: ClusterIP
  selector:
    app: module-api
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: module-api-ingress
  namespace: klosetlab
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - v3.klosetlab.site
    secretName: klosetlab-tls
  rules:
  - host: v3.klosetlab.site
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: module-api-svc
            port:
              number: 8080
